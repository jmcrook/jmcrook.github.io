<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Order</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class='padded centered-child pinkbox'>
      <form>
        <input id="quantity" type="number" placeholder="Quantity" class="form-input">
        <br>
        <div display="inline-block">
          <input id="withPillow" type="checkbox">
          <label style="font-family: Arial;" for="withPillow">
            With Pillow? (+29.99$) Pillow case alone fits two regular-sized pillows
          </label>
        </div>

        <br>
        <input id="full-name" type="text" placeholder="full name" class="form-input">
        <br>
        <input id="email" type="email" placeholder="email" class="form-input">
        <br>
        <input id="venmo-id" type="text" placeholder="venmo ID" class="form-input">
        <br>
        <input id="address-line1" type="text" placeholder="address line 1" class="form-input">
        <input id="address-line2" type="text" placeholder="address line 2" class="form-input">
        <br>
        <p style="font-family: Arial; font-size: medium;">
          Product available in U.S. and Canada only.
        </p>
        <input id="city" type="text" placeholder="city" class="form-input">
        <input id="region" type="text" placeholder="state / province" class="form-input">
        <input id="postal-code" type="text" placeholder="zip or postal code" class="form-input">

      </form>
    <div>



  </body>
</html>
