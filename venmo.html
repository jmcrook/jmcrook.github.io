<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Order</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class='padded centered-child pinkbox'>
      <form action="https://formspree.io/mlennoqg" method="POST">
        <input name="quantity" type="number" placeholder="Quantity" class="form-input">
        <br>
        <div display="inline-block">
          <input name="withPillow" type="checkbox">
          <label style="font-family: Arial;" for="withPillow">
            With Pillow? (+29.99$) Pillow case alone fits two regular-sized pillows
          </label>
        </div>

        <br>
        <input name="full-name" type="text" placeholder="full name" class="form-input" required>
        <br>
        <input name="employer" type="text" placeholder="employer" class="form-input" required>
        <br>
        <input name="email" type="email" placeholder="email" class="form-input" required>
        <br>
        <input name="venmo-id" type="text" placeholder="venmo ID" class="form-input" required>
        <br>
        <input name="address-line1" type="text" placeholder="address line 1" class="form-input" required>
        <input name="address-line2" type="text" placeholder="address line 2" class="form-input">
        <br>
        <p style="font-family: Arial; font-size: medium;">
          Product available in U.S. and Canada only.
        </p>
        <input name="city" type="text" placeholder="city" class="form-input" required>
        <input name="region" type="text" placeholder="state / province" class="form-input" required>
        <input name="postal-code" type="text" placeholder="zip or postal code" class="form-input" required>
        <input name="submit" type="submit">
      </form>
    <div>



  </body>
</html>
