<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Order</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class='padded pinkbox'>
      <form class="gform" method="POST"
      action="https://script.google.com/macros/s/AKfycby-K3uNTupDX8aGcMvsqtuRHiC29Kk1-Ry57go_EBz9iB5OQZbO/exec">
        <div class="text-centered form-elements">
          <p style="font-family: Arial; font-style: italic; font-weight: bold;">
            Please fill out the form below and we will Venmo request you!~~</p>
            <p style="color: hotpink; font-weight: bold; font-size: x-large;">A portion of all proceeds go to Bernie!!</p>
          <div class="row">
            <div class="label-column column">
              <label for="shirts" class=form-label>Shirts ($39.99)</label>
            </div>
            <div class="total-column column">
              <label for="S">S</label>
              <input type="number" id="S" name="small" placeholder="Quantity" onchange="calculateAmount()">
              <br>
              <label for="M">M</label>
              <input type="number" id="M" name="medium" placeholder="Quantity" onchange="calculateAmount()">
              <br>
              <label for="L">L</label>
              <input type="number" id="L" name="large" placeholder="Quantity" onchange="calculateAmount()">
              <br>
              <br>
            </div>
          </div>
          <div class="row">
            <div class="label-column column">
              <label for="cases" class='form-label'>Pillowcase without pillow ($39.99) Quantity:
                <br> Pillow cases fit one body pillow or two typical pillows.
              </label>
            </div>
            <div class="column">
              <input name="cases" id='c' onchange="calculateAmount()"
                type="number" placeholder="Quantity" class="form-input" required>
            </div>
          </div>
          <div class="row">
            <div class="label-column column">
              <label for="pillows" class='form-label'>
                Pillowcase with pillow ($69.99) Quantity:
              </label>
            </div>
            <div class="column">
              <input id='p' name="pillows" onchange="calculateAmount()"
                type="number" placeholder="Quantity" class="form-input">
            </div>
          </div>
          <div class="row">
            <div class="label-column column">
              <label for="full-name" class=form-label>Full Name:</label>
            </div>
            <div class="column">
              <input name="full-name" type="text" placeholder="full name" class="form-input" required>
            </div>
          </div>
          <div class="row">
            <div class="label-column column">
              <label for="employer" class=form-label>Employer:</label>
            </div>
            <div class="column">
              <input name="employer" type="text" placeholder="employer" class="form-input" required>
            </div>
          </div>
          <div class="row">
            <div class="label-column column">
              <label for="email" class=form-label>Email:</label>
            </div>
            <div class="column">
              <input name="email" type="email" placeholder="email" class="form-input" required>
            </div>
          </div>
          <div class="row">
            <div class="label-column column">
              <label for="venmo-id"  class=form-label>Venmo ID:</label>
            </div>
            <div class="column">
              <input name="venmo-id" type="text" placeholder="venmo ID" class="form-input" required>
            </div>
          </div>
          <div class="row">
            <div class="label-column column">
              <label for="address-line1" type="text" class=form-label>Address Line 1:</label>
            </div>
            <div class="column">
              <input name="address-line1" type="text" placeholder="address line 1" class="form-input" required>
            </div>
          </div>
          <div class="row">
            <div class="label-column column">
              <label for="address-line2" type="text" class=form-label>Address Line 2:</label>
            </div>
            <div class="column">
              <input name="address-line2" type="text" placeholder="address line 2" class="form-input">
            </div>
          </div>
          <div class="row">
            <div class="label-column column">
              <label for="city" class=form-label>City:</label>
            </div>
            <div class="column">
              <input name="city" type="text" placeholder="city" class="form-input" required>
            </div>
          </div>
          <div class="row">
            <div class="label-column column">
              <label for="region" class=form-label>State or Province:</label>
              <p class="aside">
                Product available in U.S. and Canada only.
              </p>
            </div>
            <div class="column">
              <input name="region" type="text" placeholder="state / province" class="form-input" required>
            </div>
          </div>
          <div class="row">
            <div class="label-column column">
              <label for="postal-code" class=form-label>Postal Code</label>
            </div>
            <div class="column">
              <input name="postal-code" type="text" placeholder="zip or postal code" class="form-input" required>
            </div>
          </div>
          <div class="row">
            <div class="label-column column">
              <p>Order:</p>
            </div>
            <div class="padded total-column column">
              <input id="order" name="order" readonly></input>
            </div>
          </div>
          <div class="row">
            <div class="label-column column">
              <p>Tax:</p>
            </div>
            <div class="padded total-column column">
              <input id="tax" name="tax" readonly></input>
            </div>
          </div>
          <div class="row">
            <div class="label-column column">
              <p>Total:</p>
            </div>
            <div class="padded total-column column">
              <input id="total" name="total" readonly></input>
            </div>
          </div>
          <input name="submit" type="submit" class="form-submit-button-3d_round_pink">
        </div>
        <div style="display:none; text-align: center;" class="thankyou_message">
         <!-- You can customize the thankyou message by editing the code below -->
         <h2><em>Thanks</em> for placing an order!!
         </h2>
        </div>
      </form>
    </div>
    <script data-cfasync="false" type="text/javascript" src="form-submission-handler.js">
    </script>
    <script>
      function calculateAmount() {
        var s = Math.round(document.getElementById('S').value);
        s += Math.round(document.getElementById('M').value);
        s += Math.round(document.getElementById('L').value);
        var c = document.getElementById('c').value;
        var p = document.getElementById('p').value;

        /*display the result*/
        document.getElementById('order').value = (s*39.99) + (c*39.99) + (p * 69.99);
        document.getElementById('tax').value = Math.round(((s*39.99*.085) + (((c*39.99) + (p*69.99))*.08875))*100)/100;
        document.getElementById('total').value = Math.round(((s*39.99*1.085) + (((c*39.99) + (p*69.99))*1.08875))*100)/100;
  }
    </script>
  </body>
</html>
